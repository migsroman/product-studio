const { useState, useMemo } = React;

/* ═══════════════════════════════════════════════════════════════════════════
   GENERIC P&C WORKFLOW GENERATION MODEL
   ═══════════════════════════════════════════════════════════════════════════ */

// Universal P&C semantic domains — every product maps into these
const PC_DOMAINS = [
  { id: "identification", label: "Identification", icon: "🏢", order: 1,

    universalFields: ["named_insured", "entity_type", "primary_state", "effective_date", "expiration_date", "new_renewal"],
    scope: "account", widgetType: "form",
  },
  { id: "risk_units", label: "Risk Units", icon: "📍", order: 2,
    description: "The repeating unit of risk. Every P&C product has exactly one primary risk unit type.",
    examples: [
      { lob: "Commercial Auto", unit: "Vehicle", fields: ["VIN", "year", "make", "model", "GVW", "use_class", "radius"] },
      { lob: "Habitational GL", unit: "Location", fields: ["address", "zip", "stories", "crime_score", "LLC_name"] },
      { lob: "Workers' Comp", unit: "Class Code", fields: ["class_code", "state", "payroll", "employee_count"] },
      { lob: "Property", unit: "Location/Building", fields: ["address", "construction_type", "year_built", "occupancy", "TIV"] },
      { lob: "BOP", unit: "Location", fields: ["address", "building_class", "BPP_limit", "revenue"] },
    ],
    scope: "per-unit", widgetType: "table",
  },
  { id: "exposures", label: "Exposure Base", icon: "📊", order: 3,
    description: "Quantitative measures per risk unit that drive premium calculation. Always per-unit.",
    examples: [
      { lob: "Commercial Auto", measures: ["vehicle_count", "fleet_size", "cost_new"] },
      { lob: "Habitational GL", measures: ["door_count", "sq_footage", "acreage", "bed_count"] },
      { lob: "Workers' Comp", measures: ["payroll", "employee_count", "hours_worked"] },
      { lob: "Property", measures: ["TIV", "building_value", "contents_value", "BI_value"] },
    ],
    scope: "per-unit", widgetType: "table",
  },
  { id: "coverages", label: "Coverages & Limits", icon: "🛡️", order: 4,
    description: "Coverage selections, limits, and deductibles. Always a mix of account-level and per-unit.",
    scopePattern: "Account-level coverages (policy aggregate, blanket endorsements) + per-unit coverages (occurrence limits, deductibles, location-specific exclusions).",
    scope: "mixed", widgetType: "form + conditional table",
  },
  { id: "rating_mods", label: "Rating Modifications", icon: "⚖️", order: 5,
    description: "Underwriter judgment factors and schedule modifications. Scope varies by LOB.",
    examples: [
      { lob: "Commercial Auto", factors: ["driver_safety_mod", "fleet_discount", "loss_free_credit"], scope: "per-vehicle + account" },
      { lob: "Habitational GL", factors: ["all 8 UW risk factors"], scope: "all per-location" },
      { lob: "Workers' Comp", factors: ["experience_mod", "schedule_credit", "ARAP"], scope: "account (bureau-driven)" },
      { lob: "Property", factors: ["protective_devices", "sprinkler_credit", "cat_risk_factor"], scope: "per-building" },
    ],
    scope: "varies", widgetType: "table or form",
  },
  { id: "forms", label: "Forms & Endorsements", icon: "📄", order: 6,
    description: "Policy forms with attachment logic, selection rules, and merge field mappings. Always comes after coverages because coverage selections drive form attachment.",

    scope: "account", widgetType: "checklist + conditional",
  },
  { id: "premium_review", label: "Premium & Quote", icon: "💰", order: 7,
    description: "Rater outputs — premium breakdown by coverage line and risk unit. Always last. Always read-only.",
    scope: "account", widgetType: "read-only summary",
  },
];

// Generation heuristics — the rules the algorithm applies
const GENERATION_HEURISTICS = [
  {
    id: "h1", name: "Risk Unit Detection", priority: 1,
    rule: "Scan all data sources for array-cardinality sheets. The primary array sheet identifies the risk unit type. Its fields become the Risk Units step.",
    input: "Rater schema with cardinality metadata",
    output: "Risk unit type + fields + max items",
    example: "Inputs_Loc (cardinality: array, maxItems: 10) → Risk unit = Location",
  },
  {
    id: "h2", name: "Scope Partitioning", priority: 2,
    rule: "Every field gets classified as account-scope or per-unit-scope. Account fields → form widgets. Per-unit fields → table widgets. Mixed-scope sources split into subsections.",
    input: "Field scope metadata from schema + rater structure",
    output: "Scope assignment per field",
    example: "Coverages sheet has 8 account fields + 7 per-location fields → split into two widget groups",
  },
  {
    id: "h3", name: "Semantic Domain Clustering", priority: 3,
    rule: "Fields with the same semantic category group into the same step, even if they come from different data sources. Categories: identification, coverage, exposure, rating-factor, form-field.",
    input: "Semantic category from schema mapping (core_column_id prefix)",
    output: "Domain assignment per field",
    example: "crime_score (from rater) + flood_zone (from API) → both go in Risk Units step because they're location attributes",
  },
  {
    id: "h4", name: "Dependency Ordering", priority: 4,
    rule: "If field A drives/conditions field B, A's step must come before B's step. Topological sort on the dependency graph determines step order.",
    input: "Edge list from data graph",
    output: "Partial ordering constraints",
    example: "num_locations → Inputs_Loc → crime_score → habitability_exclusion. So: Overview → Locations → Coverages.",
  },
  {
    id: "h5", name: "Form Trigger Resolution", priority: 5,
    rule: "Forms attach after the step containing their trigger field. Mandatory forms always attach. Conditional forms get 'triggers' edges from the field that gates them.",
    input: "Form attachment rules + coverage/field selection state",
    output: "Form step with conditional annotations",
    example: "blanket_ai toggle triggers CG 20 10 form → Forms step shows 'Attached when Blanket AI = ON'",
  },
  {
    id: "h6", name: "Widget Type Inference", priority: 6,
    rule: "Account-scope form fields → Form widget. Per-unit array fields → Table widget. Toggles/selects → Form with dropdowns. Read-only outputs → Summary card.",
    input: "Scope + field type",
    output: "Widget type per step",
    example: "8 per-location risk factor dropdowns → Table widget with 8 columns × N location rows",
  },
  {
    id: "h7", name: "Merge Field Binding", priority: 7,
    rule: "Form template merge fields (e.g., {{account_name}}) resolve to graph nodes. Disconnected merge fields surface as warnings. The graph provides the single source of truth for what data populates form templates.",
    input: "Form template merge fields + graph node IDs",
    output: "Merge field → graph node mapping + disconnected field warnings",
    example: "{{effective_date}} → maps to graph node 'effective_date' from Inputs sheet",
  },
];

// PM Product Definition facets — the complete experience
const PM_FACETS = [
  {
    id: "coverages_rating", label: "Coverages & Rating", icon: "🛡️",
    description: "Coverage selections, limits/deductible options, risk factors, industry classes, exposure units. The business rules that define what this product offers and how it's priced.",
    graphRelation: "Each coverage toggle adds/removes a graph node. Risk factor options configure node properties. All changes propagate to workflow generation.",
    currentAnalog: "Partially exists in rater step widget configuration. Spread across multiple places today.",
  },
  {
    id: "forms_documents", label: "Forms & Documents", icon: "📄",
    description: "Which policy forms are available, when they attach (mandatory/conditional/optional), which merge fields map to which data, and how quote packages are assembled.",
    graphRelation: "Forms are nodes in the graph with 'triggers' edges from coverage/field nodes. Merge fields are 'reads' edges from data nodes to form template slots. Attachment rules are conditional edges.",
    currentAnalog: "Form configuration page (your screenshot 2) + quote template mapping page (your screenshot 1). Today these are disconnected from the rater config.",
    subTabs: [
      { label: "Form Library", desc: "Which forms are available for this product. ISO forms, bureau forms, carrier proprietary. Compliance type (mandatory/optional)." },
      { label: "Attachment Rules", desc: "When does each form attach? Linked to graph: 'Attach CG 20 10 when blanket_ai = ON'. Today this is raw JSON — should be visual rule builder." },
      { label: "Template Mapping", desc: "Merge fields in document templates → graph nodes. {{account_name}} → named_insured. {{per_project_aggregate_cap}} → per_loc_aggregate. Disconnected slots surface as warnings." },
    ],
  },
  {
    id: "eligibility", label: "Eligibility & Appetite", icon: "🎯",
    description: "Outer bounds of what this product can write. State availability, class code restrictions, limit ranges, risk unit maximums. This is what gets filed with regulators.",
    graphRelation: "Eligibility rules are constraint nodes in the graph that gate the entire product. They don't produce workflow steps — they produce triage rules that run before the UW ever sees the submission.",
    currentAnalog: "Doesn't have a dedicated home today. Partially in Control Tower, partially implicit in rater structure.",
  },
  {
    id: "uw_workflow", label: "UW Workflow", icon: "🔄",
    description: "The generated sequential flow the underwriter walks through. Review step order, add custom steps, configure which fields appear where. Generated from the graph — PM adjusts, doesn't build from scratch.",
    graphRelation: "100% derived from graph traversal. Every step corresponds to a cluster of graph nodes. Every field in a step is a graph node. Step order follows dependency edges. Widget type follows scope.",
    currentAnalog: "Rater nav + rater steps with widgets (your screenshot 3). Today this is manually assembled by FDEs.",
  },
  {
    id: "preview", label: "Preview & Test", icon: "👁️",
    description: "Live preview of the UW-facing experience. Fill in sample data, see conditional logic fire, watch forms attach/detach, review premium calculations.",
    graphRelation: "Renders the generated workflow with live data. Exercises the graph end-to-end.",
    currentAnalog: "Preview toggle in rater configuration. Limited to individual step preview today.",
  },
];

/* ═══════════════════════════════════════════════════════════════════════════
   REACT COMPONENTS
   ═══════════════════════════════════════════════════════════════════════════ */

function App() {
  const [activeView, setActiveView] = useState("revised_split");

  const views = [
    { id: "revised_split", label: "Revised V2 Split" },
    { id: "generic_algorithm", label: "Generic Generation Algorithm" },
    { id: "pc_domains", label: "P&C Domain Model" },
    { id: "forms_integration", label: "Forms & Documents" },
    { id: "pm_experience", label: "Full PM Experience" },
    { id: "progressive", label: "Progressive Generation" },
    { id: "engineering", label: "Engineering Alignment" },
    { id: "bridge", label: "The Loop (End-to-End)" },
  ];

  return (
    <div style={{ minHeight: "100vh" }}>
      <div style={{ background: "#1e293b", color: "white", padding: "20px 32px" }}>
        <div style={{ maxWidth: 1280, margin: "0 auto" }}>
          <div style={{ fontSize: 11, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>Product Studio Architecture v2</div>
          <h1 style={{ fontSize: 24, fontWeight: 700, marginBottom: 6 }}>Data Graph as Product Definition</h1>
          <p style={{ fontSize: 13, color: "#94a3b8", maxWidth: 800 }}>
            v2: Tab ordering corrected, generic P&C generation algorithm, forms integrated, progressive generation with confidence scoring, feedback loop model.
          </p>
        </div>
      </div>

      <div style={{ background: "white", borderBottom: "1px solid #e2e8f0", padding: "0 32px", position: "sticky", top: 0, zIndex: 50 }}>
        <div style={{ maxWidth: 1280, margin: "0 auto", display: "flex", gap: 0, overflowX: "auto" }}>
          {views.map(v => (
            <button key={v.id} onClick={() => setActiveView(v.id)} style={{
              padding: "12px 16px", fontSize: 12, fontWeight: activeView === v.id ? 600 : 400,
              color: activeView === v.id ? "#1e293b" : "#64748b", whiteSpace: "nowrap",
              borderBottom: activeView === v.id ? "2px solid #1e293b" : "2px solid transparent",
              background: "none", border: "none", cursor: "pointer",
            }}>{v.label}</button>
          ))}
        </div>
      </div>

      <div style={{ maxWidth: 1280, margin: "0 auto", padding: "32px" }}>
        {activeView === "revised_split" && <RevisedSplitView />}
        {activeView === "generic_algorithm" && <GenericAlgorithmView />}
        {activeView === "pc_domains" && <PCDomainsView />}
        {activeView === "forms_integration" && <FormsView />}
        {activeView === "pm_experience" && <PMExperienceView />}
        {activeView === "progressive" && <ProgressiveGenerationView />}
        {activeView === "engineering" && <EngineeringAlignmentView />}
        {activeView === "bridge" && <BridgeView />}
      </div>
    </div>
  );
}

function Card({ children, style }) {
  return <div style={{ background: "white", borderRadius: 12, border: "1px solid #e2e8f0", padding: 24, ...style }}>{children}</div>;
}

function ScopeBadge({ scope, small }) {
  const colors = {
    "account": { bg: "#f0fdf4", border: "#86efac", text: "#166534" },
    "per-unit": { bg: "#f0f9ff", border: "#7dd3fc", text: "#0c4a6e" },
    "per-location": { bg: "#f0f9ff", border: "#7dd3fc", text: "#0c4a6e" },
    "mixed": { bg: "#faf5ff", border: "#c4b5fd", text: "#5b21b6" },
    "varies": { bg: "#fffbeb", border: "#fde68a", text: "#92400e" },
  };
  const c = colors[scope] || colors["account"];
  return <span style={{ display: "inline-flex", padding: small ? "2px 6px" : "3px 8px", borderRadius: 4, fontSize: small ? 10 : 11, fontWeight: 600, background: c.bg, color: c.text, border: `1px solid ${c.border}` }}>{scope}</span>;
}

function Callout({ color, icon, title, children }) {
  const colors = { amber: { bg: "#fffbeb", border: "#fde68a", title: "#92400e", text: "#78350f" }, blue: { bg: "#eff6ff", border: "#bfdbfe", title: "#1e40af", text: "#1e3a5f" }, green: { bg: "#f0fdf4", border: "#bbf7d0", title: "#166534", text: "#14532d" }, red: { bg: "#fef2f2", border: "#fecaca", title: "#991b1b", text: "#7f1d1d" } };
  const c = colors[color] || colors.amber;
  return (
    <div style={{ background: c.bg, border: `1px solid ${c.border}`, borderRadius: 8, padding: 16 }}>
      <p style={{ fontSize: 13, fontWeight: 600, color: c.title, marginBottom: 6 }}>{icon} {title}</p>
      <div style={{ fontSize: 12, color: c.text, lineHeight: 1.6 }}>{children}</div>
    </div>
  );
}

/* ─── Revised Split View ──────────────────────────────────────────────────── */

function RevisedSplitView() {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
      <Callout color="amber" icon="⚡" title="What changed from v1">
        <p><strong>1.</strong> Tab ordering corrected: Schema Mapping moves before the Data Graph (it provides the semantic identity that makes dependency detection possible).</p>
        <p style={{ marginTop: 4 }}><strong>2.</strong> "Product Config" relabeled — the PM's experience is the entire product definition, not one tab. Restructured into five facets: Coverages & Rating, Forms & Documents, Eligibility, UW Workflow, Preview.</p>
        <p style={{ marginTop: 4 }}><strong>3.</strong> Forms and document templates integrated as a first-class facet with three sub-views: Form Library, Attachment Rules, Template Mapping.</p>
      </Callout>

      <Card>
        <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 20 }}>Revised V2 Split — Corrected Flow</h2>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 48px 1fr", gap: 0, alignItems: "start" }}>
          {/* FDE side */}
          <div style={{ border: "2px solid #bfdbfe", borderRadius: 12, overflow: "hidden" }}>
            <div style={{ background: "#1e40af", color: "white", padding: "12px 16px" }}>
              <div style={{ fontSize: 14, fontWeight: 700 }}>🔧 Rater Configuration</div>
              <div style={{ fontSize: 11, color: "#93c5fd", marginTop: 2 }}>FDE / Technical Persona</div>
            </div>
            {[
              { num: "1", tab: "Connect Rater", desc: "Upload Excel workbook. System parses sheets, detects cardinality (single/array/mixed/lookup), identifies field types and cell references.", output: "Raw data source nodes with fields and cardinality", color: "#3b82f6" },
              { num: "2", tab: "Schema Mapping", desc: "Map rater fields → Federato schema (core_column_id). This gives each field semantic identity. System uses these mappings to auto-detect dependencies in the next step.", output: "Semantic identity per field → enables dependency detection", color: "#8b5cf6", changed: true },
              { num: "3", tab: "Data Graph", desc: "Interactive dependency graph. System auto-detects edges using semantic mappings from step 2 (zip → geo API, industry class → lookup table, coverage → form trigger). FDE validates and adds edges the system can't infer.", output: "Complete dependency graph → source of truth", color: "#f59e0b", changed: true },
            ].map(t => (
              <div key={t.num} style={{ padding: 14, borderTop: "1px solid #e2e8f0", background: t.changed ? "#eff6ff" : "white" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                  <span style={{ width: 22, height: 22, borderRadius: "50%", background: t.color, color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700 }}>{t.num}</span>
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#1e293b" }}>{t.tab}</span>
                  {t.changed && <span style={{ fontSize: 9, background: "#fef3c7", color: "#92400e", padding: "2px 6px", borderRadius: 3, fontWeight: 600 }}>REORDERED</span>}
                </div>
                <p style={{ fontSize: 11, color: "#64748b", lineHeight: 1.6, marginBottom: 4 }}>{t.desc}</p>
                <p style={{ fontSize: 10, color: "#3b82f6", fontWeight: 500 }}>→ {t.output}</p>
              </div>
            ))}
          </div>

          {/* Arrow */}
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", paddingTop: 100 }}>
            <div style={{ background: "#fef3c7", border: "1px solid #fde68a", borderRadius: 8, padding: "6px 4px", textAlign: "center" }}>
              <div style={{ fontSize: 8, fontWeight: 700, color: "#92400e" }}>GRAPH</div>
              <div style={{ fontSize: 14 }}>→</div>
            </div>
          </div>

          {/* PM side */}
          <div style={{ border: "2px solid #bbf7d0", borderRadius: 12, overflow: "hidden" }}>
            <div style={{ background: "#166534", color: "white", padding: "12px 16px" }}>
              <div style={{ fontSize: 14, fontWeight: 700 }}>📦 Product Definition</div>
              <div style={{ fontSize: 11, color: "#86efac", marginTop: 2 }}>PM Persona — the entire product</div>
            </div>
            {[
              { num: "1", tab: "Coverages & Rating", desc: "Coverage toggles, limits/deductible options, risk factors, industry classes, exposure units. Every toggle mutates a graph node.", color: "#10b981" },
              { num: "2", tab: "Forms & Documents", desc: "Form library, attachment rules (when forms include in quote), merge field mapping ({{effective_date}} → graph node). Disconnected fields surface as warnings.", color: "#f97316", isNew: true },
              { num: "3", tab: "Eligibility", desc: "Appetite bounds: state availability, class restrictions, limit ranges, risk unit maximums. What gets filed with regulators. Gates submission triage.", color: "#8b5cf6", isNew: true },
              { num: "4", tab: "UW Workflow", desc: "Generated from graph traversal. PM reviews step order, adds custom steps, adjusts field placement. Generation reasons annotated on each step.", color: "#0ea5e9" },

          </div>
        </div>
      </Card>

      <Callout color="blue" icon="💡" title="Why Schema Mapping comes before the Data Graph">

      </Callout>
    </div>

/* ─── Generic Algorithm View ──────────────────────────────────────────────── */

function GenericAlgorithmView() {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
      <Card>
        <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>Generic P&C Workflow Generation Algorithm</h2>
        <p style={{ fontSize: 13, color: "#64748b", lineHeight: 1.6 }}>
          This algorithm works for any standard P&C product — not just Habitational GL. It's based on universal structural patterns that all P&C products share: every product has identification, risk units, exposures, coverages, rating modifications, forms, and premium outputs. The algorithm discovers these from the data graph, not from LOB-specific logic.
        </p>
      </Card>

      <Card>
        <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 16 }}>The Seven Heuristics</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {GENERATION_HEURISTICS.map((h, i) => (
            <div key={h.id} style={{ border: "1px solid #e2e8f0", borderRadius: 8, padding: 16 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                <span style={{ width: 28, height: 28, borderRadius: "50%", background: "#1e293b", color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, flexShrink: 0 }}>{h.priority}</span>
                <div>
                  <span style={{ fontSize: 14, fontWeight: 600 }}>{h.name}</span>
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 8 }}>
                <div style={{ background: "#f8fafc", borderRadius: 6, padding: 10 }}>
                  <div style={{ fontSize: 10, fontWeight: 600, color: "#94a3b8", textTransform: "uppercase", marginBottom: 4 }}>Rule</div>
                  <p style={{ fontSize: 11, color: "#475569", lineHeight: 1.5 }}>{h.rule}</p>
                </div>
                <div style={{ background: "#f0f9ff", borderRadius: 6, padding: 10 }}>
                  <div style={{ fontSize: 10, fontWeight: 600, color: "#0ea5e9", textTransform: "uppercase", marginBottom: 4 }}>Input → Output</div>
                  <p style={{ fontSize: 11, color: "#0c4a6e", lineHeight: 1.5 }}><strong>In:</strong> {h.input}<br/><strong>Out:</strong> {h.output}</p>
                </div>
                <div style={{ background: "#fffbeb", borderRadius: 6, padding: 10 }}>
                  <div style={{ fontSize: 10, fontWeight: 600, color: "#92400e", textTransform: "uppercase", marginBottom: 4 }}>Example</div>
                  <p style={{ fontSize: 11, color: "#78350f", lineHeight: 1.5 }}>{h.example}</p>
                </div>
              </div>
            </div>
          ))}
        </div>
      </Card>

      <Callout color="green" icon="🔑" title="What makes this generic (not LOB-specific)">
        <p>None of these heuristics reference "locations" or "vehicles" or "GL" by name. They operate on structural properties: <strong>cardinality</strong> (is this an array?), <strong>scope</strong> (account vs per-unit?), <strong>semantic category</strong> (from schema mapping), <strong>edge type</strong> (drives/conditions/triggers/lookup), and <strong>field type</strong> (select/number/toggle). The same algorithm produces a Vehicle Schedule step for Commercial Auto and a Locations step for Habitational GL — because both are array-cardinality, per-unit-scope data sources.</p>
      </Callout>
    </div>
  );
}

            { who: "PM", action: "Toggles Habitability ON, A&B ON, HNOA OFF", graphChange: "+2 coverage nodes enabled, -1 removed. Downstream edges update.", workflowEffect: "Coverage step regenerates with updated per-location conditions.", color: "#166534" },
            { who: "PM", action: "Connects 4 form templates, defines attachment rules visually", graphChange: "+4 form nodes, +3 trigger edges (blanket_ai→CG2010, ebl→EBL, crime→SAM)", workflowEffect: "Step 6 (Forms) turns green. All steps green. 100% readiness.", color: "#166534" },
            { who: "PM", action: "Adds custom 'Additional Insureds' step after Locations", graphChange: "+1 custom step node (manual, not from rater)", workflowEffect: "Step 2a appears. Green immediately — PM-defined, no graph dependencies to resolve.", color: "#166534" },
            { who: "PM", action: "Previews full UW flow with sample data", graphChange: "No change — read-only traversal", workflowEffect: "All green. Product ready to publish.", color: "#166534" },
          ].map((step, i) => (
            <div key={i} style={{ display: "flex", gap: 0, fontSize: 11 }}>
              <div style={{ width: 60, flexShrink: 0, textAlign: "center", paddingTop: 10 }}>
                <span style={{
                  display: "inline-block", padding: "3px 8px", borderRadius: 3, fontWeight: 600, fontSize: 10,
                  background: step.who === "System" ? "#dbeafe" : step.who === "FDE" ? "#e0e7ff" : "#dcfce7",
                  color: step.color,
                }}>{step.who}</span>
              </div>
              <div style={{ width: 2, background: "#e2e8f0", flexShrink: 0, margin: "0 12px" }} />
              <div style={{ flex: 1, display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, padding: "8px 0", borderBottom: "1px solid #f1f5f9" }}>
                <div><span style={{ fontWeight: 600, color: "#1e293b" }}>{step.action}</span></div>
                <div style={{ color: "#8b5cf6" }}>{step.graphChange}</div>
                <div style={{ color: "#0ea5e9" }}>{step.workflowEffect}</div>
              </div>
            </div>
          ))}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "60px 26px 1fr 1fr 1fr", gap: 8, marginTop: 8, paddingTop: 8, borderTop: "2px solid #e2e8f0" }}>
          <div />
          <div />
          <div style={{ fontSize: 10, fontWeight: 600, color: "#94a3b8", textTransform: "uppercase" }}>Action</div>
          <div style={{ fontSize: 10, fontWeight: 600, color: "#8b5cf6", textTransform: "uppercase" }}>Graph Change</div>
          <div style={{ fontSize: 10, fontWeight: 600, color: "#0ea5e9", textTransform: "uppercase" }}>Workflow Effect</div>
        </div>
      </Card>

      <Callout color="amber" icon="⚡" title="Why loops beat waterfalls">
        <p>In a gated waterfall, the PM waits for the FDE to finish, then discovers the workflow doesn't match expectations, then asks the FDE to go back and fix the graph. With progressive generation, the PM sees the workflow evolving from step 1. They can give feedback ("why are risk factors in a form instead of a table?") while the FDE is still working. Both personas see the same live artifact — they just interact with it differently.</p>
      </Callout>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
